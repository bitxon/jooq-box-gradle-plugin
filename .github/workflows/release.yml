name: Release
run-name: Release (${{ inputs.releaseType }})

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: 'Release type'
        required: true
        type: choice
        default: patch
        options: [patch, minor, major]

jobs:
  validate-inputs:
    name: Job - Validate Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Validate branch and release type
        run: |
          BRANCH="${{ github.ref_name }}"
          TYPE="${{ inputs.releaseType }}"
          if [[ "$BRANCH" == "main" ]]; then
            : # all release types allowed
          elif [[ "$BRANCH" == release/* ]]; then
            if [[ "$TYPE" != "patch" ]]; then
              echo "::error::Only 'patch' is allowed on release branches."
              exit 1
            fi
          else
            echo "::error::Release workflow can only run from 'main' or 'release/*' branches."
            exit 1
          fi

  build-plugin:
    name: Job - Build Plugin
    needs: validate-inputs
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      checks: write

  release-git-tag:
    name: Job - Create Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-plugin
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version and push tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ inputs.releaseType }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Releasing $LATEST_TAG → $NEW_TAG"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  publish-to-plugin-portal:
    name: Job - Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-git-tag
    # TODO: add secrets when unmocking:
    #   GRADLE_PUBLISH_KEY   — from plugins.gradle.org profile
    #   GRADLE_PUBLISH_SECRET — from plugins.gradle.org profile
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Publish to Gradle Plugin Portal
        # TODO: replace with real publish when plugin is ready for Portal submission:
        #   run: ./gradlew publishPlugins -Pversion=${{ needs.release-git-tag.outputs.version }}
        #   env:
        #     GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
        #     GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: echo "Assume we published successfully (mocked)"

  publish-to-github-release:
    name: Job - Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish-to-plugin-portal, release-git-tag]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build artifacts
        run: ./gradlew assemble -Pversion=${{ needs.release-git-tag.outputs.version }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ needs.release-git-tag.outputs.new_tag }}" \
            build/libs/*.jar \
            --title "${{ needs.release-git-tag.outputs.new_tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
